<svg width="800" height="300" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="300" fill="url(#bg-gradient)"/>
  <!-- Cityscape -->
  <g stroke="#2563eb" stroke-width="3" fill="none">
    <rect x="80" y="180" width="40" height="60" rx="5"/>
    <rect x="130" y="160" width="30" height="80" rx="5"/>
    <rect x="170" y="200" width="25" height="40" rx="5"/>
    <rect x="210" y="170" width="35" height="70" rx="5"/>
    <rect x="260" y="190" width="30" height="50" rx="5"/>
    <rect x="300" y="150" width="50" height="90" rx="5"/>
    <rect x="360" y="180" width="40" height="60" rx="5"/>
    <rect x="410" y="200" width="30" height="40" rx="5"/>
    <rect x="450" y="170" width="35" height="70" rx="5"/>
    <rect x="500" y="190" width="30" height="50" rx="5"/>
    <rect x="540" y="160" width="40" height="80" rx="5"/>
    <rect x="590" y="180" width="35" height="60" rx="5"/>
    <rect x="640" y="200" width="30" height="40" rx="5"/>
    <rect x="680" y="170" width="40" height="70" rx="5"/>
  </g>
  <!-- People group -->
  <g>
    <circle cx="220" cy="250" r="18" fill="#3b82f6" fill-opacity="0.8"/>
    <circle cx="260" cy="255" r="14" fill="#60a5fa" fill-opacity="0.8"/>
    <circle cx="300" cy="250" r="18" fill="#2563eb" fill-opacity="0.8"/>
    <circle cx="340" cy="255" r="14" fill="#60a5fa" fill-opacity="0.8"/>
    <circle cx="380" cy="250" r="18" fill="#3b82f6" fill-opacity="0.8"/>
    <!-- Heads -->
    <circle cx="220" cy="235" r="7" fill="#fff"/>
    <circle cx="260" cy="240" r="5" fill="#fff"/>
    <circle cx="300" cy="235" r="7" fill="#fff"/>
    <circle cx="340" cy="240" r="5" fill="#fff"/>
    <circle cx="380" cy="235" r="7" fill="#fff"/>
  </g>
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
</svg> 